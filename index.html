<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="site-title">Manuel Cerello — Nutrizionista & Personal Trainer</title>

<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400;1,700&family=Lora:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
<style>
/* MANTENGO IL TUO STILE ORIGINALE INTEGRALE */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#F5F0E8;--cream2:#EDE8DC;--white:#FDFCF8;
  --green-dark:#2A5C35;--green-mid:#3D7A4A;--green-light:#6AAF78;
  --green-pale:#C8E6CC;--green-wash:#E8F4EA;
  --yellow:#F5C842;
  --text:#1A2E1C;--text-mid:#3D5040;--text-muted:#6B7D6D;
}
html{scroll-behavior:smooth}
body{font-family:'Nunito',sans-serif;background:var(--cream);color:var(--text);overflow-x:hidden;line-height:1.6}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(245,240,232,0.95);backdrop-filter:blur(10px);border-bottom:1.5px solid var(--green-pale);padding:0.9rem 2rem;display:flex;justify-content:space-between;align-items:center}
.nav-logo{font-family:'Lora',serif;font-size:1.15rem;font-weight:600;color:var(--green-dark);text-decoration:none;display:flex;align-items:center;gap:0.5rem}
.nav-dot{width:8px;height:8px;border-radius:50%;background:var(--green-light);display:inline-block}
.nav-links{display:flex;gap:1.5rem;align-items:center}
.nav-links a{font-size:0.82rem;font-weight:700;letter-spacing:0.06em;color:var(--text-muted);text-decoration:none;text-transform:uppercase;transition:color 0.2s}
.nav-links a:hover{color:var(--green-dark)}
.nav-cta{background:var(--green-dark)!important;color:white!important;padding:0.5rem 1.25rem;border-radius:50px}

/* HERO */
.hero{min-height:100vh;padding-top:80px;display:grid;grid-template-columns:1fr 1fr;position:relative;overflow:hidden;background:var(--cream)}
.hero-blob{position:absolute;border-radius:50%;z-index:0}
.hero-blob1{width:600px;height:600px;top:-150px;right:-100px;background:radial-gradient(circle,rgba(100,175,120,0.2) 0%,transparent 70%)}
.hero-blob2{width:400px;height:400px;bottom:-100px;left:-80px;background:radial-gradient(circle,rgba(42,92,53,0.1) 0%,transparent 70%)}
.hero-left{position:relative;z-index:1;display:flex;flex-direction:column;justify-content:center;padding:clamp(3rem,6vw,5rem) clamp(2rem,5vw,5rem)}
.eyebrow{display:inline-flex;align-items:center;gap:0.5rem;background:var(--green-wash);border:1.5px solid var(--green-pale);color:var(--green-mid);font-size:0.75rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:0.35rem 1rem;border-radius:50px;margin-bottom:1.5rem;width:fit-content;opacity:0;animation:fadeUp 0.6s 0.1s forwards}
.hero-title{font-family:'Lora',serif;font-size:clamp(2.2rem,4.5vw,3.8rem);font-weight:400;line-height:1.15;color:var(--text);margin-bottom:0.4rem;opacity:0;animation:fadeUp 0.6s 0.2s forwards}
.punch{font-family:'Nunito',sans-serif;font-size:clamp(2.6rem,5.5vw,5rem);font-weight:900;font-style:italic;color:var(--green-dark);display:block;line-height:1;margin-top:0.1rem}
.hero-sub{font-size:1rem;color:var(--text-muted);max-width:420px;margin:1rem 0 1.5rem;line-height:1.8;opacity:0;animation:fadeUp 0.6s 0.35s forwards}
.check-list{list-style:none;display:flex;flex-direction:column;gap:0.65rem;margin-bottom:2rem;opacity:0;animation:fadeUp 0.6s 0.45s forwards}
.check-list li{display:flex;align-items:flex-start;gap:0.6rem;font-size:0.95rem;color:var(--text-mid);font-weight:600}
.check-list li em{font-style:normal;font-weight:900;color:var(--green-dark)}
.ci{width:22px;height:22px;border-radius:50%;background:var(--green-dark);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:white;font-size:0.68rem;margin-top:2px}
.cta-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap;opacity:0;animation:fadeUp 0.6s 0.55s forwards}
.btn-main{background:var(--green-dark);color:white;padding:0.9rem 2rem;border-radius:50px;text-decoration:none;font-size:0.82rem;font-weight:800;letter-spacing:0.05em;text-transform:uppercase;box-shadow:0 4px 20px rgba(42,92,53,0.3);transition:transform 0.2s,box-shadow 0.2s;display:flex;align-items:center;gap:0.5rem}
.btn-main:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(42,92,53,0.35)}
.btn-main::after{content:'→'}
.btn-sec{color:var(--green-mid);font-weight:700;font-size:0.85rem;text-decoration:none;display:flex;align-items:center;gap:0.4rem;border-bottom:2px solid var(--green-pale);padding-bottom:2px;transition:color 0.2s,border-color 0.2s}
.btn-sec:hover{color:var(--green-dark);border-color:var(--green-mid)}

.hero-right{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 2rem 3rem}
.food-wrap{position:relative;width:min(380px,90%);aspect-ratio:1}
.food-circle{position:absolute;inset:10%;border-radius:50%;background:radial-gradient(circle at 40% 40%,#d4edda,#92c99e)}
.food-emoji{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:clamp(6rem,12vw,9rem);filter:drop-shadow(0 8px 24px rgba(0,0,0,0.12));z-index:1}
.fbadge{position:absolute;z-index:2;background:white;border-radius:50px;padding:0.45rem 1rem;font-size:0.78rem;font-weight:800;color:var(--green-dark);box-shadow:0 4px 16px rgba(0,0,0,0.1);border:1.5px solid var(--green-pale);display:flex;align-items:center;gap:0.4rem;white-space:nowrap}
.fbadge .pct{font-size:0.85rem;font-weight:900;color:var(--green-dark)}
.fbadge .lbl{font-size:0.7rem;color:var(--text-muted);font-weight:600}
.fbadge:nth-child(3){animation:float 3s 0s ease-in-out infinite;top:2%;left:-2%}
.fbadge:nth-child(4){animation:float 3s 1s ease-in-out infinite;bottom:18%;left:-6%}
.fbadge:nth-child(5){animation:float 3s 0.5s ease-in-out infinite;top:8%;right:-2%}
.fbadge:nth-child(6){animation:float 3s 1.5s ease-in-out infinite;bottom:10%;right:0%}
.food-center-label{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:14%;pointer-events:none}
.food-pct-big{font-size:2rem;font-weight:900;color:var(--green-dark);line-height:1}
.food-pct-sub{font-size:0.6rem;font-weight:700;color:var(--green-mid);text-transform:uppercase;letter-spacing:0.08em;text-align:center;max-width:70px;line-height:1.3}
.stat-row{display:flex;gap:1rem;justify-content:center;margin-top:1.5rem;flex-wrap:wrap}
.stat-pill{background:white;border-radius:16px;padding:0.7rem 1.25rem;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,0.08);border:1.5px solid var(--green-pale)}
.stat-pill strong{display:block;font-size:1.4rem;font-weight:900;color:var(--green-dark);line-height:1}
.stat-pill span{font-size:0.62rem;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:0.08em}
.science-note{background:var(--white);border:1.5px solid var(--green-pale);border-radius:16px;padding:1rem 1.25rem;margin-top:1.25rem;width:min(420px,100%)}
.science-note p{font-size:0.8rem;color:var(--text-muted);line-height:1.65}
.science-note strong{color:var(--green-dark);font-weight:900}
.sci-source{font-size:0.65rem!important;font-style:italic;opacity:0.6;margin-top:0.35rem}

/* COMMONS */
.pill{display:inline-flex;align-items:center;gap:0.4rem;background:var(--green-wash);border:1.5px solid var(--green-pale);color:var(--green-mid);font-size:0.7rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:0.3rem 0.9rem;border-radius:50px;margin-bottom:1rem}
.stitle{font-family:'Lora',serif;font-size:clamp(1.9rem,3.2vw,2.8rem);font-weight:400;line-height:1.2;color:var(--text);margin-bottom:1rem}
.stitle strong{font-weight:600;color:var(--green-dark)}
.stitle em{font-style:italic;color:var(--green-mid)}
.swrap{padding:clamp(4.5rem,7vw,7rem) clamp(1.5rem,5vw,5rem)}

/* WHO */
.who-section{background:var(--white)}
.who-inner{display:grid;grid-template-columns:1fr 1.1fr;gap:clamp(3rem,6vw,6rem);align-items:center}
.who-visual{position:relative;background:linear-gradient(145deg,#c8e6cc,#8dc99b);border-radius:40px 40px 120px 40px;aspect-ratio:4/5;display:flex;align-items:center;justify-content:center;overflow:hidden}
.who-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;color:var(--green-dark);opacity:0.65;text-align:center;padding:2rem}
.who-placeholder span{font-size:4rem}
.who-placeholder p{font-size:0.85rem;font-weight:700;line-height:1.5}
.who-badge{position:absolute;top:1.5rem;right:-1rem;background:var(--green-dark);color:white;border-radius:16px;padding:0.75rem 1.25rem;font-size:0.75rem;font-weight:800;box-shadow:0 4px 20px rgba(42,92,53,0.3);text-align:center}
.who-badge strong{display:block;font-size:1.4rem;line-height:1}
.who-text p{font-size:0.97rem;color:var(--text-muted);line-height:1.8;margin-bottom:1rem}
.chips{display:flex;flex-wrap:wrap;gap:0.5rem;margin-top:0.5rem}
.chip{background:var(--green-wash);border:1.5px solid var(--green-pale);color:var(--green-dark);border-radius:50px;font-size:0.78rem;font-weight:700;padding:0.3rem 0.85rem}

/* WHY */
.why-section{background:var(--cream)}
.why-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;margin-top:3rem}
.why-card{background:var(--white);border-radius:24px;padding:2rem 1.75rem;border:1.5px solid transparent;transition:border-color 0.3s,transform 0.3s;position:relative;overflow:hidden}
.why-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--green-light),var(--green-dark));transform:scaleX(0);transform-origin:left;transition:transform 0.4s ease}
.why-card:hover{border-color:var(--green-pale);transform:translateY(-4px)}
.why-card:hover::before{transform:scaleX(1)}
.why-icon{width:52px;height:52px;border-radius:16px;background:var(--green-wash);display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin-bottom:1.25rem}
.why-card h3{font-family:'Lora',serif;font-size:1.2rem;font-weight:600;color:var(--text);margin-bottom:0.6rem}
.why-card p{font-size:0.875rem;color:var(--text-muted
