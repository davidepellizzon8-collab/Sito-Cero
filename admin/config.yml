backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "home"
    label: "Home Page"
    delete: false
    editor:
      preview: false
    files:
      - name: "testi"
        label: "Modifica Tutto il Sito"
        file: "data/settings.json"
        fields:
          # --- HERO ---
          - {label: "Slogan Verde", name: "hero_eyebrow", widget: "string"}
          - {label: "Titolo Hero", name: "hero_title", widget: "string"}
          - {label: "Testo Evidenziato (Ma cosa mangi?)", name: "hero_punch", widget: "string"}
          - {label: "Sottotitolo Hero", name: "hero_sub", widget: "text"}
          - {label: "Punto elenco 1", name: "hero_check_1", widget: "string"}
          - {label: "Punto elenco 2", name: "hero_check_2", widget: "string"}
          - {label: "Punto elenco 3", name: "hero_check_3", widget: "string"}
          
          # --- CHI SONO ---
          - {label: "Foto Profilo", name: "who_photo", widget: "image"}
          - {label: "Titolo Chi Sono", name: "who_title", widget: "string"}
          - {label: "Bio Paragrafo 1", name: "who_p1", widget: "text"}
          - {label: "Bio Paragrafo 2", name: "who_p2", widget: "text"}

          # --- SERVIZI (Perché Scegliermi) ---
          - label: "Perché Scegliermi (Carte)"
            name: "services"
            widget: "list"
            fields:
              - {label: "Icona (Emoji)", name: "icon", widget: "string"}
              - {label: "Titolo", name: "title", widget: "string"}
              - {label: "Testo", name: "text", widget: "text"}

          # --- METODO (I 5 Passi) ---
          - label: "Passi del Metodo"
            name: "method_steps"
            widget: "list"
            fields:
              - {label: "Numero (es. 01)", name: "num", widget: "string"}
              - {label: "Titolo", name: "title", widget: "string"}
              - {label: "Testo", name: "text", widget: "text"}

          # --- SPECIALIZZAZIONI ---
          - {label: "Titolo Banner Medico", name: "spec_title", widget: "string"}
          - {label: "Testo Banner Medico", name: "spec_text", widget: "text"}
          
          # --- LISTE (Prezzi e Testimonianze) ---
          - label: "Listino Prezzi"
            name: "pricing"
            widget: "list"
            fields:
              - {label: "Metti in evidenza (Colore scuro)?", name: "featured", widget: "boolean", default: false}
              - {label: "Nome Pacchetto", name: "name", widget: "string"}
              - {label: "Importo", name: "amount", widget: "string"}
              - {label: "Dettaglio (es. al mese)", name: "per", widget: "string"}
              - label: "Cosa include (Punti elenco)"
                name: "features"
                widget: "list"
                field: {label: "Punto", name: "feature", widget: "string"}
          
          - label: "Testimonianze"
            name: "testimonials"
            widget: "list"
            fields:
              - {label: "Testo", name: "text", widget: "text"}
              - {label: "Autore", name: "author", widget: "string"}
              - {label: "Dettaglio Paziente", name: "detail", widget: "string"}

          # --- CONTATTI E FOOTER ---
          - {label: "Titolo Contatti", name: "cta_title", widget: "string"}
          - {label: "Testo Descrittivo Contatti", name: "cta_desc", widget: "text"}
          - {label: "Sedi", name: "cta_locations", widget: "string"}
          - {label: "Telefono", name: "contact_phone", widget: "string"}
          - {label: "Testo Footer (Copyright)", name: "footer_credits", widget: "string"}
